:{fa:"محاسبه میانه و مد",en:"Calculate median and mode"},chapter8ItemRange:{fa:"دامنه تغییرات",en:"Range"},chapter8ItemSimpleProbability:{fa:"احتمال یک پیشامد ساده",en:"Probability of a simple event"},chapter8ItemTwoDice:{fa:"احتمال پرتاب دو تاس (مجموع)",en:"Probability for two dice (sum)"},chapter9ItemCircleAreaPerimeter:{fa:"محیط و مساحت دایره",en:"Circle circumference and area"},chapter9ItemCentralAngle:{fa:"زاویه مرکزی دایره",en:"Central angle of a circle"},chapter9ItemInscribedAngle:{fa:"زاویه محاطی دایره",en:"Inscribed angle of a circle"},chapter9ItemSectorArea:{fa:"مساحت قطاع دایره",en:"Sector area"},chapter9ItemArcLength:{fa:"طول کمان دایره",en:"Arc length"},hNumbersTitle:{fa:"آغاز اعداد",en:"The Beginning of Numbers"},hNumbersDesc:{fa:"بشر قدیمی با شمارش دام‌ها و محصولات کشاورزی، به ایده‌ی عدد رسید. سیستم‌های گویا و عصاچین اولین راه‌های ثبت عدد بودند.",en:"Early humans developed the idea of number through counting animals and crops. Tally marks and base systems were the first ways to record quantity."},hGeometryTitle:{fa:"هندسه در مصر و یونان",en:"Geometry in Egypt & Greece"},hGeometryDesc:{fa:"هندسه از نیاز به تقسیم اراضی رود نیل به‌وجود آمد. بعدها فیثاغورس، اقلیدس و ارشمیدس اصولش را پایه‌ریزی کردند.",en:"Geometry arose from the need to partition farmland along the Nile. Later Pythagoras, Euclid and Archimedes laid its axiomatic foundations."},hAlgebraTitle:{fa:"جبر در دنیای اسلامی",en:"Algebra in the Islamic Golden Age"},hAlgebraDesc:{fa:"خوارزمی با کتاب «الجبر و المقابله» شاخه‌ی جبر را پایه‌گذاری کرد. این سبک حل مسئله، بعدها به کل جهان گسترش یافت.",en:'Al-Khwarizmi founded algebra with his book "The Compendious Book on Calculation by Completion and Balancing". This problem-solving style spread across the world.'},hZeroTitle:{fa:"اختراع صفر",en:"The Invention of Zero"},hZeroDesc:{fa:"صفر نه فقط عددی است، بلکه مفهومی است که چندین هزار سال طول کشید تا پیدا شود. بابیلی‌ها، هندی‌ها و مسلمانان مسیر تکامل آن را طرد کردند.",en:"Zero is not just a number — it is روش تجزیه: عددها را به شمارنده‌های اول تجزیه کن، همه عامل‌ها را با بیشترین توان بردار.
مثال: 12 = 2^2 x 3 و 18 = 2 x 3^2 پس ک.م.م = 2^2 x 3^2 = 36.`,chapter1ItemSimplifyFraction:`برای ساده‌سازی کسر، صورت و مخرج را بر ب.م.م آن‌ها تقسیم می‌کنیم.
اگر دیگر عدد مشترکی برای تقسیم وجود نداشت، کسر در ساده‌ترین حالت است.
مثال: 24/36، ب.م.م 24 و 36 برابر 12 است؛ پس 24/36 = 2/3.`,chapter1ItemAddSubtractFractions:`برای جمع یا تفریق کسرها، اول مخرج مشترک می‌گیریم.
بعد صورت‌ها را متناسب با مخرج مشترک تبدیل می‌کنیم و جمع یا تفریق را روی صورت‌ها انجام می‌دهیم.
مثال: 1/4 + 1/6، مخرج مشترک 12 است؛ 3/12 + 2/12 = 5/12.`,chapter1ItemMultiplyDivideFractions:`در ضرب کسرها، صورت‌ها را در هم و مخرج‌ها را در هم ضرب می‌کنیم.
در تقسیم کسرها، کسر دوم را وارونه می‌کنیم و ضرب می‌کنیم.
مثال: 2/3 x 3/4 = 6/12 = 1/2 و 5/6 ÷ 2/3 = 5/6 x 3/2 = 15/12 = 5/4.`,chapter1ItemDecimalToFraction:`برای تبدیل عدد اعشاری به کسر، تعداد رقم‌های بعد از ممیز را بشمار.
اگر یک رقم باشد مخرج 10، دو رقم باشد مخرج 100 و سه رقم باشد مخرج 1000 است؛ سپس کسر را ساده کن.
مثال: 0.75 = 75/100 = 3/4.`,chapter2ItemPrimeComposite:`عدد اول عددی بزرگ‌تر از 1 است که فقط دو مقسوم‌علیه مثبت دارد: 1 و خودش.
عدد مرکب عددی بزرگ‌تر از 1 است که غیر از 1 و خودش، مقسوم‌علیه دیگری هم داشته باشد.
برای بررسی یک عدد، کافی است بخش‌پذیری آن را با عددهای اول کوچک‌تر یا مساوی جذر آن امتحان کنیم.
مثال: برای 37، عددهای اول تا جذر 37 یعنی 2، 3 و 5 را بررسی می‌کنیم؛ 37 بر هیچ‌کدام بخش‌پذیر نیست، پس اول است.
نکته مهم: عدد 1 نه اول است و نه مرکب.`,chapter2ItemPrimeFactorization:`تجزیه به شمارنده‌های اول یعنی نوشتن یک عدد به صورت ضرب عددهای اول.
برای این کار از کوچک‌ترین عدد اول یعنی 2 شروع می‌کنیم و تا وقتی ممکن است تقسیم می‌کنیم.
بعد سراغ 3، سپس 5، 7، 11 و بقیه عددهای اول می‌رویم.
مثال: 84 ابتدا بر 2 تقسیم می‌شود: 84 = 2 x 42 و 42 = 2 x 21 و 21 = 3 x 7.
پس 84 = 2^2 x 3 x 7. این شکل برای ب.م.م، ک.م.م و تعداد مقسوم‌علیه‌ها خیلی کاربرد دارد.`,chapter2ItemDivisorsList:`مقسوم‌علیه‌های یک عدد، عددهایی هستند که آن عدد بر آن‌ها بدون باقی‌مانده تقسیم شود.
برای پیدا کردن همه آن‌ها، جفت‌های ضربی عدد را پیدا کن.
هر وقت یک جفت پیدا کردی، هر دو عدد آن جفت مقسوم‌علیه هستند.
مثال: برای 28 داریم: 1x28، 2x14، 4x7.
پس مقسوم‌علیه‌های 28 عبارت‌اند از: 1، 2، 4، 7، 14، 28.`,chapter2ItemDivisorsCount:`برای تعداد مقسوم‌علیه‌ها لازم نیست همه را لیست کنیم؛ از تجزیه اول استفاده می‌کنیم.
اگر عدد به صورت p^a x q^b x r^c نوشته شود، تعداد مقسوم‌علیه‌ها برابر است با (a+1)(b+1)(c+1).
دلیلش این است که از هر عامل اول می‌توانیم توان‌های 0 تا همان نما را انتخاب کنیم.
مثال: 72 = 2^3 x 3^2 است.
پس تعداد مقسوم‌علیه‌های مثبت 72 برابر است با (3+1)(2+1)=4x3=12.`,chapter2ItemSieve:`غربال اراتستن روشی سریع برای پیدا کردن همه عددهای اول تا یک عدد مشخص n است.
اول عددهای 2 تا n را می‌نویسیم. 2 را نگه می‌داریم و مضرب‌های 2 را خط می‌زنیم.
بعد عدد خط‌نخورده بعدی یعنی 3 را نگه می‌داریم و مضرب‌هایش را خط می‌زنیم. همین کار را ادامه می‌دهیم.
در پایان، عددهایی که خط نخورده‌اند اول هستند.
مثال: تا 20، عددهای اول باقی‌مانده این‌ها هستند: 2، 3، 5، 7، 11، 13، 17، 19.`,chapter3ItemInteriorSum:`برای پیدا کردن مجموع زاویه‌های داخلی یک چندضلعی، آن را از یک رأس به مثلث‌ها تقسیم می‌کنیم.
هر مثلث 180 درجه زاویه داخلی دارد.
در یک nضلعی، تعداد مثلث‌ها برابر n-2 است؛ پس فرمول مجموع زوایا می‌شود: (n-2) x 180.
مثال: در شش‌ضلعی، n=6 است؛ پس مجموع زوایا = (6-2)x180 = 720 درجه.
این فرمول برای هر چندضلعی ساده کاربرد دارد.`,chapter3ItemRegularInterior:`چندضلعی منتظم یعنی همه ضلع‌ها و همه زاویه‌هایش برابر باشند.
پس برای پیدا کردن یک زاویه داخلی، اول مجموع زاویه‌های داخلی را حساب می‌کنیم.
بعد آن را بر تعداد ضلع‌ها تقسیم می‌کنیم.
فرمول مستقیم: هر زاویه داخلی = ((n-2)x180) / n.
مثال: در هشت‌ضلعی منتظم، مجموع زوایا 1080 است؛ پس هر زاویه = 1080/8 = 135 درجه.`,chapter3ItemRegularExterior:`زاویه خارجی زاویه‌ای است که کنار زاویه داخلی و روی امتداد ضلع ساخته می‌شود.
در هر چندضلعی منتظم، مجموع زاویه‌های خارجی برابر 360 درجه است.
بنابراین هر زاویه خارجی برابر است با 360/n.
مثال: در ده‌ضلعی منتظم، هر زاویه خارجی = 360/10 = 36 درجه.
نکته: زاویه داخلی و خارجی کنار هم مکمل‌اند؛ یعنی جمعشان 180 درجه است.`,chapter3ItemDiagonals:`قطر پاره‌خطی است که دو رأس غیرمجاور یک چندضلعی را به هم وصل می‌کند.
از هر رأس n-3 قطر می‌توان رسم کرد، چون خود رأس و دو رأس کناری حساب نمی‌شوند.
اگر این مقدار را برای همه رأس‌ها حساب کنیم، هر قطر دو بار شمرده می‌شود؛ پس تقسیم بر 2 می‌کنیم.
فرمول تعداد قطرها: n(n-3)/2.
مثال: در هشت‌ضلعی، تعداد قطرها = 8x5/2 = 20.`,chapter3ItemTrianglesFromVertex:`وقتی از یک رأس چندضلعی همه قطرهای ممکن را رسم کنیم، شکل به چند مثلث تقسیم می‌شود.
تعداد این مثلث‌ها همیشه n-2 است.
این موضوع دلیل اصلی فرمول مجموع زاویه‌های داخلی است.
مثال: در هفت‌ضلعی، از یک رأس 5 مثلث ساخته می‌شود چون 7-2=5.
پس مجموع زاویه‌های داخلی هفت‌ضلعی هم 5x180 = 900 درجه است.`,chapter4ItemExpressionValue:`مقدار عددی عبارت یعنی به جای متغیرها عدد بگذاریم و حاصل را حساب کنیم.
ترتیب انجام عملیات مهم است: اول ضرب و تقسیم، سپس جمع و تفریق.
مثال: در ax+by+c اگر a=2، x=3، b=4، y=5، c=1 باشد، مقدار برابر 2x3 + 4x5 + 1 = 27 است.`,chapter4ItemSolveEquation:`حل معادله یعنی پیدا کردن عددی که دو طرف معادله را برابر کند.
برای ax+b = cx+d، جمله‌های xدار را یک طرف و عددها را طرف دیگر می‌بریم.
مثال: 3x+2 = x+10، پس 2x = 8 و x = 4.`,chapter4ItemSimpleFactoring:`فاکتورگیری یعنی عامل مشترک جمله‌ها را بیرون بکشیم.
در ax+bx، عامل مشترک x است؛ پس ax+bx = x(a+b).
مثال: 3x+5x = x(3+5) = 8x.`,chapter4ItemBinomialProduct:`برای ضرب دو دوجمله‌ای، هر جمله اولی را در هر جمله دومی ضرب می‌کنیم.
فرمول مهم: (x+a)(x+b)=x^2+(a+b)x+ab.
مثال: (x+2)(x+3)=x^2+5x+6.`,chapter5ItemVectorAdd:`برای جمع دو بردار، مؤلفه‌های هم‌نام را با هم جمع می‌کنیم.
اگر A=(a,b) و B=(c,d) باشد، A+B=(a+c,b+d).
مثال: (2,3)+(4,1)=(6,4).`,chapter5ItemVectorSubtract:`برای تفریق دو بردار، مؤلفه‌های هم‌نام را از هم کم می‌کنیم.
اگر A=(a,b) و B=(c,d) باشد، A-B=(a-c,b-d).
مثال: (5,7)-(2,3)=(3,4).`,chapter5ItemScalarMultiply:`ضرب عدد در بردار یعنی آن عدد را در هر مؤلفه بردار ضرب کنیم.
اگر k عدد باشد و A=(a,b)، آنگاه kA=(ka,kb).
مثال: 3(2,-4)=(6,-12).`,chapter5ItemVectorFromPoints:`برای پیدا کردن بردار از نقطه A به B، مختصات A را از B کم می‌کنیم.
اگر A=(x1,y1) و B=(x2,y2)، آنگاه AB=(x2-x1,y2-y1).
مثال: از A(1,2) به B(5,6)، بردار برابر (4,4) است.`,chapter5ItemVectorIJ:`بردار (a,b) را می‌توان به صورت ai+bj نوشت.
i جهت افقی و j جهت عمودی را نشان می‌دهد.
مثال: بردار (3,-2) به صورت 3i-2j نوشته می‌شود.`,chapter6ItemHypotenuse:`در مثلث قائم‌الزاویه، ضلع روبه‌روی زاویه 90 درجه وتر است.
قضیه فیثاغورس می‌گوید: وتر^2 = ضلع اول^2 + ضلع دوم^2.
مثال: اگر ضلع‌های قائمه 3 و 4 باشند، وتر^2=9+16=25 پس وتر=5.`,chapter6ItemMissingLeg:`اگر وتر و یک ضلع قائمه را داشته باشیم، ضلع قائمه دیگر از رابطه b^2 = c^2 - a^2 به دست می‌آید.
c وتر است و همیشه از ضلع‌های قائمه بزرگ‌تر است.
مثال: وتر 13 و یک ضلع 5 باشد، ضلع دیگر = √(169-25)=12.`,chapter6ItemCheckRight:`برای بررسی قائم‌الزاویه بودن، بزرگ‌ترین ضلع را وتر فرض می‌کنیم.
اگر مربع بزرگ‌ترین ضلع برابر مجموع مربع دو ضلع دیگر باشد، مثلث قائم‌الزاویه است.
مثال: 6، 8، 10 چون 10^2 = 6^2 + 8^2، قائم‌الزاویه است.`,chapter6ItemRightArea:`مساحت مثلث قائم‌الزاویه برابر نصف حاصل‌ضرب دو ضلع قائمه است.
فرمول: مساحت = (ضلع قائمه اول x ضلع قائمه دوم) / 2.
مثال: اگر ضلع‌ها 6 و 8 باشند، مساحت = 6x8/2 = 24.`,chapter7ItemPower:`توان یعنی ضرب تکراری یک عدد در خودش.

مثال: 2^5 = 2x2x2x2x2 = 32.`,chapter7ItemSameBaseMultiply:`وقتی پایه‌ها مساوی هستند و ضرب داریم، نماها را جمع می‌کنیم.

مثال: 3^2 x 3^4 = 3^6.`,chapter7ItemSameExponentMultiply:`وقتی نماها مساوی هستند، می‌توان پایه‌ها را ضرب کرد و همان نما را نگه داشت.

مثال: 2^3 x 5^3 = 10^3.`,chapter7ItemSameBaseDivide:`وقتی پایه‌ها مساوی هستند و تقسیم داریم، نماها را کم می‌کنیم.
فرمول: a^m ÷ a^n = a^(m-n) البته a صفر نباشد.
مثال: 5^6 ÷ 5^2 = 5^4.`,chapter7ItemPowerOfPower:`وقتی یک توان دوباره به توان می‌رسد، نماها را در هم ضرب می‌کنیم.
فرمول: (a^m)^n = a^(mn).
مثال: (2^3)^4 = 2^12.`,chapter7ItemSquareRoot:`جذر عددی است که اگر در خودش ضرب شود، عدد اصلی را بدهد.
اگر عدد مربع کامل باشد، جذر آن دقیق است؛ مثل √49=7.
اگر مربع کامل نباشد، جذر تقریبی می‌گیریم؛ مثل √50 که نزدیک 7.07 است.`,chapter8ItemMean:`میانگین یا معدل یعنی مجموع داده‌ها تقسیم بر تعداد آن‌ها.
برای محاسبه، همه عددها را جمع کن و بر تعداد داده‌ها تقسیم کن.
مثال: میانگین 12، 15، 18، 19 برابر 64/4 = 16 است.`,chapter8ItemMedianMode:`میانه عدد وسط داده‌های مرتب‌شده است. اگر تعداد داده‌ها زوج باشد، میانگین دو عدد وسط را می‌گیریم.
مد داده‌ای است که بیشترین تکرار را دارد.
مثال: در 2، 4، 4، 6، 8 مد برابر 4 است.`,chapter8ItemRange:`دامنه تغییرات اختلاف بزرگ‌ترین و کوچک‌ترین داده است.

مثال: برای 4، 9، 12، 18 دامنه برابر 18-4=14 است.`,chapter8ItemSimpleProbability:`احتمال یعنی نسبت تعداد حالت‌های مطلوب به کل حالت‌های ممکن.

مثال: در پرتاب تاس، احتمال آمدن عدد زوج 3/6 = 1/2 است.`,chapter8ItemTwoDice:`در پرتاب دو تاس، کل حالت‌ها 36 تاست چون هر تاس 6 حالت دارد.
برای احتمال یک مجموع، تعداد جفت‌هایی را بشمار که آن مجموع را می‌سازند.

r شعاع و d قطر است؛ قطر دو برابر شعاع است.
مثال: اگر r=7 و π=22/7 باشد، محیط 44 و مساحت 154 می‌شود.`,chapter9ItemCentralAngle:`زاویه مرکزی زاویه‌ای است که رأس آن مرکز دایره باشد.
نسبت زاویه مرکزی به 360 درجه، نسبت همان بخش از دایره را نشان می‌دهد.
مثال: زاویه 90 درجه یک‌چهارم دایره است.`,chapter9ItemInscribedAngle:`زاویه محاطی زاویه‌ای است که رأس آن روی دایره قرار دارد.
زاویه محاطی روبه‌روی یک کمان نصف زاویه مرکزی همان کمان است.
مثال: اگر زاویه مرکزی 100 درجه باشد، زاویه محاطی 50 درجه است.`,chapter9ItemSectorArea:`قطاع بخشی از دایره است که بین دو شعاع و یک کمان قرار دارد.
مساحت قطاع = زاویه مرکزی/360 x مساحت کل دایره.
مثال: زاویه 90 درجه یعنی یک‌چهارم دایره؛ پس مساحت قطاع یک‌چهارم مساحت دایره است.`,chapter9ItemArcLength:`طول کمان بخشی از محیط دایره است.

 w-1.5 rounded-full shrink-0",style:{background:"var(--c-accent)"}}),u.jsx("span",{className:"flex-1",children:r(B)}),u.jsx("span",{className:"text-lg leading-none",children:Q?"-":"+"})]}),Q&&u.jsxs("div",{className:"glass-strong rounded-3xl p-4 fade-up",children:[u.jsx("div",{className:"font-semibold text-ink text-sm mb-3",children:r(B)}),u.jsx("p",{className:"text-ink-soft text-sm leading-8 whitespace-pre-line text-justify",children:I0(B,o,r(B))})]})]},B)})})]},y.titleKey)})})]})}const sh=[{title:{fa:"اختراع صفر؛ عددی که جای خالی را معنا کرد",en:"The Invention of Zero",ar:"اختراع الصفر"},meta:{fa:"هند، جهان اسلام، اروپا",en:"India, Islamic world, Europe",ar:"الهند، العالم الإسلامي، أوروبا"},summary:{fa:"صفر هم جای خالی را نشان می‌دهد و هم خودش یک عدد است.",en:"Zero is both a placeholder and a number.",ar:"الصفر يدل على الفراغ وهو أيضاً عدد مستقل."},body:{fa:`صفر در ظاهر ساده است، اما تاریخ آن بسیار عمیق است. انسان‌های اولیه می‌توانستند چیزها را بشمارند، اما نشان دادن «هیچ» به یک نماد مستقل نیاز داشت.

در هند، صفر به شکل یک عدد واقعی وارد محاسبات شد. سپس دانشمندان مسلمان این ایده را گسترش دادند و از راه ترجمه‌ها و کتاب‌ها به اروپا رساندند.

اهمیت صفر فقط در نوشتن عددهایی مانند 10 و 100 نیست. صفر باعث شد دستگاه ارزش مکانی کامل شود. بدون صفر، محاسبه‌های بزرگ، جبر، رایانه و بسیاری از علوم امروزی شکل کنونی خود را نداشتند.`,en:`Zero looks simple, but its history is deep. Early people could count objects, yet representing "nothing" required a separate symbol.

In India, zero became a true number used in calculation. Muslim scholars later expanded the idea and carried it through books and translations into Europe.

Zero is not only useful in numbers like 10 and 100. It completed the place-value system. Without zero, large calculations, algebra, computers, and much of modern science would not have their current form.`,ar:`يبدو الصفر بسيطاً، لكن تاريخه عميق. كان الإنسان قادراً على العد، لكن تمثيل «لا شيء» احتاج إلى رمز مستقل.

في الهند أصبح الصفر عدداً حقيقياً يدخل في الحساب. ثم طوّر العلماء المسلمون هذه الفكرة ونقلوها بالكتب والترجمات إلى أوروبا.

أهمية الصفر ليست فقط في كتابة أعداد مثل 10 و100. لقد أكمل نظام القيمة المكانية. وبدونه ما كانت الحسابات الكبيرة والجبر والحواسيب وكثير من العلوم الحديثة بالشكل الذي نعرفه اليوم.`}},{title:{fa:"خوارزمی و تولد جبر",en:"Al-Khwarizmi and Algebra",ar:"الخوارزمي والجبر"},meta:{fa:"قرن سوم هجری، بغداد",en:"9th century, Baghdad",ar:"القرن التاسع، بغداد"},summary:{fa:"جبر با خوارزمی به یک روش منظم حل مسئله تبدیل شد.",en:"Al-Khwarizmi turned algebra into an organized method.",ar:"حوّل الخوارزمي الجبر إلى طريقة منظمة."},body:{fa:`نام جبر از کتاب خوارزمی درباره «الجبر و المقابله» آمده است. او مسئله‌ها را به زبان عدد و عبارت تبدیل می‌کرد و سپس با روش مرحله‌ای حل می‌کرد.

در آن دوران، مسئله‌های ریاضی با ارث، تجارت، اندازه‌گیری زمین و تقسیم دارایی ارتباط داشتند. جبر کمک کرد برای این مسئله‌ها راه‌حل عمومی پیدا شود.

واژه algorithm نیز از نام خوارزمی گرفته شده است. بنابراین اثر او فقط در ریاضی مدرسه نیست؛ در علوم رایانه و روش‌های محاسبه امروزی هم دیده می‌شود.`,en:`The word algebra comes from Al-Khwarizmi's work on completion and balancing. He translated problems into numbers and expressions, then solved them step by step.

At that time, many mathematical problems were related to inheritance, trade, land measurement, and sharing property. Algebra made it possible to solve such problems in a general way.

The word algorithm also comes from Al-Khwarizmi's name. His influence appears not only in school mathematics, but also in computer science and modern calculation.`,ar:`كلمة الجبر جاءت من عمل الخوارزمي في «الجبر والمقابلة». كان يحوّل المسائل إلى أعداد وعبارات ثم يحلها خطوة بخطوة.

في ذلك الزمن ارتبطت مسائل الرياضيات بالميراث والتجارة وقياس الأرض وتقسيم الأموال. ساعد الجبر على إيجاد حلول عامة لهذه المسائل.

وكلمة algorithm مشتقة أيضاً من اسم الخوارزمي. لذلك يظهر أثره في رياضيات المدرسة وعلوم الحاسوب وطرق الحساب الحديثة.`}},{title:{fa:"هندسه؛ از زمین تا اثبات",en:"Geometry: From Land to Proof",ar:"الهندسة: من الأرض إلى البرهان"},meta:{fa:"مصر باستان و یونان",en:"Ancient Egypt and Greece",ar:"مصر القديمة واليونان"},summary:{fa:"هندسه از نیازهای عملی شروع شد و بعد به دانش اثبات تبدیل شد.",en:"Geometry began from practical needs and became a science of proof.",ar:"بدأت الهندسة من حاجات عملية ثم أصبحت علم البرهان."},body:{fa:`هندسه در آغاز برای اندازه‌گیری زمین، ساختن بناها و تقسیم مرزها به کار می‌رفت. در مصر باستان، پس از طغیان رود نیل، مردم باید دوباره زمین‌ها را اندازه‌گیری می‌کردند.

در یونان، هندسه شکل نظری‌تری پیدا کرد. اقلیدس تلاش کرد نتیجه‌های هندسی را با تعریف‌ها، اصل‌ها و اثبات‌های دقیق تنظیم کند.

این تغییر بسیار مهم بود: ریاضی فقط تجربه و اندازه‌گیری نبود، بلکه دانشی شد که هر نتیجه در آن باید دلیل داشته باشد.`,en:`Geometry was first used to measure land, build structures, and divide boundaries. In ancient Egypt, after the Nile flooded, people had to measure their lands again.

In Greece, geometry became more theoretical. Euclid organized geometric facts using definitions, axioms, and careful proofs.

This change was important: mathematics was no longer only measurement and experience. It became a science in which every result needed a reason.`,ar:`استُخدمت الهندسة في البداية لقياس الأرض وبناء المباني وتقسيم الحدود. في مصر القديمة، بعد فيضان النيل، كان الناس يحتاجون إلى قياس أراضيهم من جديد.

في اليونان أصبحت الهندسة أكثر نظرية. نظم إقليدس الحقائق الهندسية بالتعريفات والمسلّمات والبراهين الدقيقة.

كان هذا التحول مهماً: لم تعد الرياضيات مجرد قياس وتجربة، بل أصبحت علماً يحتاج فيه كل نتيجة إلى سبب وبرهان.`}},{title:{fa:"عدد پی؛ نسبت ثابت دایره",en:"Pi: The Circle Constant",ar:"باي: ثابت الدائرة"},meta:{fa:"از ارشمیدس تا رایانه‌ها",en:"From Archimedes to computers",ar:"من أرخميدس إلى الحواسيب"},summary:{fa:"پی نسبت محیط دایره به قطر آن است.",en:"Pi is the ratio of circumference to diameter.",ar:"باي هو نسبة محيط الدائرة إلى قطرها."},body:{fa:`اگر محیط هر دایره را بر قطر همان دایره تقسیم کنیم، همیشه به عدد ثابتی می‌رسیم. این عدد را پی یا π می‌نامیم.

ارشمیدس برای تقریب پی از چندضلعی‌های منتظم استفاده کرد. هرچه تعداد ضلع‌ها بیشتر می‌شد، تقریب دقیق‌تر می‌شد.

پی عددی گنگ است؛ یعنی رقم‌های اعشاری آن پایان ندارد. با این حال در مدرسه مقدارهای تقریبی مانند 3.14 یا 22/7 برای بیشتر مسئله‌ها کافی است.`,en:`If we divide the circumference of any circle by its diameter, we always get the same constant. This number is called pi, or π.

Archimedes approximated pi using regular polygons. As the number of sides increased, the approximation became more accurate.

Pi is irrational, meaning its decimal digits never end. Still, school problems often use approximations such as 3.14 or 22/7.`,ar:`إذا قسمنا محيط أي دائرة على قطرها نحصل دائماً على ثابت واحد. هذا العدد يسمى باي أو π.

قرّب أرخميدس قيمة باي باستعمال مضلعات منتظمة. وكلما زاد عدد الأضلاع أصبح التقريب أدق.

باي عدد غير نسبي، أي إن أرقامه العشرية لا تنتهي. ومع ذلك نستخدم في المدرسة تقريباً مثل 3.14 أو 22/7 في معظم المسائل.`}},{title:{fa:"فیثاغورس؛ فرمول مثلث قائم",en:"Pythagoras and Right Triangles",ar:"فيثاغورس والمثلث القائم"},meta:{fa:"یونان باستان",en:"Ancient Greece",ar:"اليونان القديمة"},summary:{fa:"قضیه فیثاغورس رابطه ضلع‌های قائمه و وتر را می‌گوید.",en:"The theorem relates the legs and hypotenuse.",ar:"تربط النظرية بين ضلعي القائمة والوتر."},body:{fa:`در مثلث قائم‌الزاویه، ضلع روبه‌روی زاویه 90 درجه وتر نام دارد. قضیه فیثاغورس می‌گوید: a^2 + b^2 = c^2.

این رابطه به ما کمک می‌کند اگر دو ضلع را داشته باشیم، ضلع سوم را حساب کنیم. سه‌تایی‌های معروف مانند 3، 4، 5 و 5، 12، 13 نمونه‌های ساده آن هستند.

این قضیه در نقشه‌کشی، معماری، فیزیک و حتی بازی‌سازی کاربرد دارد.`,en:`In a right triangle, the side opposite the 90-degree angle is the hypotenuse. The Pythagorean theorem says: a^2 + b^2 = c^2.

This relationship helps us find the third side when two sides are known. Famous triples such as 3, 4, 5 and 5, 12, 13 are simple examples.

The theorem is useful in mapping, architecture, physics, and even game development.`,ar:`في المثلث القائم، الضلع المقابل للزاوية 90 درجة يسمى الوتر. تقول نظرية فيثاغورس: a^2 + b^2 = c^2.

تساعدنا هذه العلاقة على إيجاد الضلع الثالث إذا عرفنا ضلعين. الثلاثيات المشهورة مثل 3، 4، 5 و5، 12، 13 أمثلة بسيطة.

تُستخدم هذه النظرية في الخرائط والعمارة والفيزياء وحتى صناعة الألعاب.`}},{title:{fa:"اعداد اول؛ آجرهای عددها",en:"Prime Numbers",ar:"الأعداد الأولية"},meta:{fa:"از یونان تا رمزنگاری",en:"From Greece to encryption",ar:"من اليونان إلى التشفير"},summary:{fa:"عددهای اول پایه ساختن عددهای مرکب هستند.",en:"Prime numbers build composite numbers.",ar:"الأعداد الأولية تبني الأعداد المركبة."},body:{fa:`عدد اول فقط بر 1 و خودش بخش‌پذیر است. این تعریف ساده، پایه بسیاری از بخش‌های نظریه اعداد است.

هر عدد مرکب را می‌توان به ضرب عددهای اول تجزیه کرد. مثلا 84 = 2^2 x 3 x 7. این موضوع برای ب.م.م، ک.م.م و مقسوم‌علیه‌ها مهم است.

امروزه عددهای اول در رمزنگاری اینترنتی هم استفاده می‌شوند. امنیت بسیاری از پیام‌ها و پرداخت‌ها به سختی تجزیه عددهای بزرگ بستگی دارد.`,en:`A prime number is divisible only by 1 and itself. This simple definition is the foundation of many parts of number theory.

Every composite number can be written as a product of primes. For example, 84 = 2^2 x 3 x 7. This is important for GCD, LCM, and divisors.

Today prime numbers are also used in internet encryption. The security of many messages and payments depends on how hard it is to factor very large numbers.`,ar:`العدد الأولي لا يقبل القسمة إلا على 1 وعلى نفسه. هذا التعريف البسيط أساس أجزاء كثيرة من نظرية الأعداد.

كل عدد مركب يمكن كتابته كحاصل ضرب أعداد أولية. مثلاً 84 = 2^2 x 3 x 7. وهذا مهم في القاسم المشترك الأكبر والمضاعف المشترك الأصغر والقواسم.

تُستخدم الأعداد الأولية اليوم في تشفير الإنترنت. تعتمد حماية كثير من الرسائل والمدفوعات على صعوبة تحليل الأعداد الكبيرة جداً.`}},{title:{fa:"مختصات؛ تبدیل شکل به عدد",en:"Coordinates",ar:"الإحداثيات"},meta:{fa:"دکارت و هندسه تحلیلی",en:"Descartes and analytic geometry",ar:"ديكارت والهندسة التحليلية"},summary:{fa:"مختصات نقطه‌ها و بردارها را با عدد توصیف می‌کند.",en:"Coordinates describe points and vectors with numbers.",ar:"تصف الإحداثيات النقاط والمتجهات بالأعداد."},body:{fa:`با دستگاه مختصات، هر نقطه روی صفحه با دو عدد مشخص می‌شود: x و y. این ایده هندسه را به جبر وصل کرد.

دکارت از کسانی بود که این نگاه را گسترش داد. پس از آن، خط‌ها و شکل‌ها را می‌شد با معادله بررسی کرد.

در ریاضی هشتم، بردار و مختصات ادامه همین ایده است. وقتی بردار از A به B را حساب می‌کنی، در واقع تغییر مکان را به زبان عدد می‌نویسی.`,en:`With coordinates, every point on a plane is described by two numbers: x and y. This idea connected geometry to algebra.

Descartes helped develop this way of thinking. After that, lines and shapes could be studied through equations.

In Grade 8, vectors and coordinates continue the same idea. When you find the vector from A to B, you write a movement using numbers.`,ar:`باستعمال الإحداثيات، توصف كل نقطة على المستوى بعددين: x و y. ربطت هذه الفكرة الهندسة بالجبر.

كان ديكارت من الذين طوروا هذه الطريقة في التفكير. بعد ذلك أصبح من الممكن دراسة الخطوط والأشكال بالمعادلات.

في الصف الثامن، المتجهات والإحداثيات امتداد لهذه الفكرة. عندما تجد المتجه من A إلى B فأنت تكتب انتقالاً بلغة الأعداد.`}},{title:{fa:"احتمال؛ ریاضی پیش‌بینی",en:"Probability",ar:"الاحتمال"},meta:{fa:"بازی‌ها، آمار، علم داده",en:"Games, statistics, data science",ar:"الألعاب، الإحصاء، علم البيانات"},summary:{fa:"احتمال درباره رخدادهای نامطمئن به زبان عدد حرف می‌زند.",en:"Probability speaks about uncertainty with numbers.",ar:"يتحدث الاحتمال عن عدم اليقين بلغة الأعداد."},body:{fa:`احتمال از پرسش‌های ساده شروع می‌شود: شانس آمدن عدد 6 در پرتاب تاس چقدر است؟ پاسخ یعنی حالت مطلوب تقسیم بر کل حالت‌ها.

اگر تاس سالم باشد، 6 حالت ممکن داریم و فقط یک حالت عدد 6 است؛ پس احتمال 1/6 است.

امروزه احتمال در هواشناسی، پزشکی، اقتصاد، بازی‌ها و هوش مصنوعی کاربرد دارد. یادگیری آن باعث می‌شود با اتفاق‌های نامطمئن منطقی‌تر برخورد کنیم.`,en:`Probability begins with simple questions: what is the chance of rolling a 6 on a die? The answer is favorable outcomes divided by all possible outcomes.

For a fair die, there are 6 possible outcomes and only one is 6, so the probability is 1/6.

Today probability is used in weather forecasts, medicine, economics, games, and artificial intelligence. Learning it helps us reason better about uncertainty.`,ar:`يبدأ الاحتمال بأسئلة بسيطة: ما فرصة ظهور العدد 6 عند رمي حجر نرد؟ الإجابة هي الحالات المطلوبة مقسومة على جميع الحالات الممكنة.

في حجر نرد عادل توجد 6 حالات ممكنة وحالة واحدة فقط هي 6، لذلك الاحتمال 1/6.

اليوم يُستخدم الاحتمال في الطقس والطب والاقتصاد والألعاب والذكاء الاصطناعي. تعلمه يساعدنا على التفكير بشكل أفضل في عدم اليقين.`}},{title:{fa:"بی‌نهایت؛ فراتر از عدد بزرگ",en:"Infinity",ar:"اللانهائية"},meta:{fa:"فلسفه و نظریه مجموعه‌ها",en:"Philosophy and set theory",ar:"الفلسفة ونظرية المجموعات"},summary:{fa:"بی‌نهایت عدد معمولی نیست؛ ایده ادامه بدون پایان است.",en:"Infinity is not an ordinary number; it is endless continuation.",ar:"اللانهائية ليست عدداً عادياً؛ إنها استمرار بلا نهاية."},body:{fa:`بی‌نهایت یعنی چیزی پایان نداشته باشد. عددهای طبیعی 1، 2، 3 و ... نمونه‌ای از یک دنباله بی‌پایان هستند.

در تاریخ ریاضی، بی‌نهایت هم جذاب بود و هم دشوار. پارادوکس‌های زنون نشان می‌دادند فکر کردن درباره تقسیم بی‌پایان مسیر چقدر پیچیده است.

در ریاضی جدید، کانتور نشان داد که حتی بی‌نهایت‌ها هم می‌توانند اندازه‌های متفاوت داشته باشند. این ایده نشان می‌دهد ریاضی فقط محاسبه نیست، بلکه مطالعه مفهوم‌ها هم هست.`,en:`Infinity means that something has no end. The natural numbers 1, 2, 3, and so on are an example of an endless sequence.

In the history of mathematics, infinity was both fascinating and difficult. Zeno's paradoxes showed how complex it is to think about endlessly dividing a path.

In modern mathematics, Cantor showed that infinities can even have different sizes. This idea shows that mathematics is not only calculation; it is also the study of concepts.`,ar:`اللانهائية تعني أن شيئاً ما لا نهاية له. الأعداد الطبيعية 1، 2، 3، ... مثال على تسلسل لا ينتهي.

في تاريخ الرياضيات كانت اللانهائية جذابة وصعبة في الوقت نفسه. أظهرت مفارقات زينون مدى تعقيد التفكير في تقسيم المسار بلا نهاية.
